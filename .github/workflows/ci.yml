name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel an in-flight run when a newer commit lands on the same ref. PR pushes
# come in bursts; without this each push holds three macOS runners hostage and
# starves the queue. The push-to-main runs use the SHA as the group so they
# never cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # The three jobs below are independent — they share only the HermesKit source
  # tree — so they run in parallel. Previously they were sequential steps in one
  # job and the total was their sum (~5 min); now CI wall-clock is the slowest
  # single job. NOTE: if branch protection lists required status checks, update
  # it to require "HermesKit", "macOS Build", and "iOS Build" instead of the old
  # single "HermesKit" check, or the build jobs won't gate merges.

  hermeskit:
    name: HermesKit
    # macos-15 only ships Xcode 16 (Swift 6.1); the package targets macOS 26 /
    # swift-tools 6.2, so build on the macOS 26 image with Xcode 26.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n1)"
          if [[ -z "$XC" ]]; then
            echo "::error::No Xcode 26 found on runner. Installed:"; ls -d /Applications/Xcode*.app; exit 1
          fi
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      # Cache the compiled SwiftPM dependencies (swift-nio, swift-nio-ssh,
      # Yams). Keyed on Package.swift because Package.resolved is gitignored;
      # the version constraints there only move when the manifest changes, and a
      # near-miss restore still builds incrementally. SwiftPM detects toolchain
      # mismatches and rebuilds, so a stale Xcode-version cache is self-healing.
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: HermesKit/.build
          key: spm-${{ runner.os }}-${{ hashFiles('HermesKit/Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # --build-tests compiles the test target here so the Test step is pure
      # run (--skip-build), keeping the build-vs-test failure signal separate
      # without compiling the tree twice.
      - name: Build
        run: swift build --package-path HermesKit --build-tests

      - name: Test
        run: swift test --package-path HermesKit --skip-build

  macos-build:
    name: macOS Build
    # macOS 26 SDK / Xcode 26 — the app targets macOS 26 (FoundationModels).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n1)"
          if [[ -z "$XC" ]]; then
            echo "::error::No Xcode 26 found on runner. Installed:"; ls -d /Applications/Xcode*.app; exit 1
          fi
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      # Talaria.xcodeproj is generated from project.yml (not committed), so it
      # must be produced before the xcodebuild step below.
      - name: Generate Xcode project
        run: xcodegen generate

      # Cache only the resolved SwiftPM package checkouts — never DerivedData's
      # build products. -clonedSourcePackagesDirPath relocates the checkouts to
      # a fixed path so we can cache them without sweeping up Xcode's
      # incremental build state, which would go stale across source edits (the
      # key doesn't move on a source-only change) and fail the build spuriously
      # against renamed/deleted modules. This caches pure git checkouts of
      # version-pinned deps — toolchain-independent, so no Xcode-version key.
      - name: Cache SwiftPM checkouts
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: xcode-spm-macos-${{ hashFiles('HermesKit/Package.swift') }}
          restore-keys: |
            xcode-spm-macos-

      - name: Build
        run: |
          xcodebuild build \
            -project Talaria.xcodeproj \
            -scheme Talaria \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath "$GITHUB_WORKSPACE/.spm-cache" \
            CODE_SIGNING_ALLOWED=NO

  ios-build:
    name: iOS Build
    # macOS 26 SDK / Xcode 26 — the iOS target floor is iOS 26 (FoundationModels).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n1)"
          if [[ -z "$XC" ]]; then
            echo "::error::No Xcode 26 found on runner. Installed:"; ls -d /Applications/Xcode*.app; exit 1
          fi
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # See the macOS job: cache the relocated SwiftPM checkouts only, not
      # DerivedData build products.
      - name: Cache SwiftPM checkouts
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: xcode-spm-ios-${{ hashFiles('HermesKit/Package.swift') }}
          restore-keys: |
            xcode-spm-ios-

      - name: Build
        run: |
          xcodebuild build \
            -scheme HermesKit \
            -destination 'generic/platform=iOS Simulator' \
            -clonedSourcePackagesDirPath "$GITHUB_WORKSPACE/.spm-cache" \
            -workspace Talaria.xcworkspace
