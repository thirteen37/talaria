name: iOS TestFlight

# Manual-only for now. iOS ships on a different cadence than the macOS DMG
# release (.github/workflows/release.yml), and a tag-triggered TestFlight upload
# would push an unproven build on every `v*` tag. Once this lane is proven, add
#   on:
#     push:
#       tags: ["v*"]
# to mirror the macOS release trigger.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version to upload (e.g. 1.0). Required."
        required: true
        type: string

# Don't let two TestFlight uploads race — App Store Connect rejects duplicate
# build numbers, and the date-based build number could collide on fast reruns.
concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  testflight:
    name: Archive, sign, upload to TestFlight
    runs-on: macos-15
    environment: release
    env:
      VERSION: ${{ github.event.inputs.version }}
      KEYCHAIN_PATH: ${{ github.workspace }}/build-ios.keychain-db

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version string
        run: |
          # Strip a leading "v" if someone passes a tag-style version.
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "${VERSION}" > VERSION

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Import Apple Distribution certificate
        env:
          IOS_DISTRIBUTION_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
          IOS_DISTRIBUTION_P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$IOS_DISTRIBUTION_P12_BASE64" ]]; then
            echo "::error::IOS_DISTRIBUTION_P12_BASE64 secret not configured (Apple Distribution cert). See RELEASE_SETUP.md §9h."
            exit 1
          fi
          echo "$IOS_DISTRIBUTION_P12_BASE64" | base64 --decode > /tmp/ios-dist.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 7200 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import /tmp/ios-dist.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_DISTRIBUTION_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Put our keychain first in the search list so codesign resolves the
          # Apple Distribution identity from it during the archive.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm -f /tmp/ios-dist.p12
          echo "Signing identities available:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Decode App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          if [[ -z "$ASC_API_KEY_BASE64" ]]; then
            echo "::error::ASC_API_KEY_BASE64 secret not configured."
            exit 1
          fi
          mkdir -p "$HOME/.private"
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$HOME/.private/AuthKey.p8"

      - name: Archive + upload to TestFlight
        # scripts/release-ios.sh archives the TalariaIOS scheme with App Store
        # signing (automatic + -allowProvisioningUpdates via the API key) and
        # uploads via destination=upload. The ASC API key must carry the
        # App Manager role for the upload to succeed (RELEASE_SETUP.md §9d).
        env:
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_KEY_PATH: ${{ github.workspace }}/.private-asc/AuthKey.p8
        run: |
          mkdir -p .private-asc
          cp "$HOME/.private/AuthKey.p8" "$ASC_KEY_PATH"
          scripts/release-ios.sh "$VERSION"
          rm -f "$ASC_KEY_PATH"
