name: Talaria
options:
  minimumXcodeGenVersion: 2.42.0
configs:
  Debug: debug
  Release: release
packages:
  HermesKit:
    path: HermesKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  # macOS-only: embedded terminal emulator that renders `hermes chat --tui`.
  # Added to the Talaria (macOS) target's dependencies only — not TalariaIOS
  # (no local/PTY path there) and not HermesKit (which stays UI-free).
  #
  # Pinned below 1.12.0 deliberately: 1.12.0+ bundles a Metal shader that forces
  # every build host (and CI) to install the Metal toolchain, which Talaria's
  # CoreText-rendered terminal doesn't need. 1.11.2 has the identical
  # LocalProcessTerminalView API (startProcess/terminate/delegate) without it.
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    exactVersion: "1.11.2"
  # Comprehensive markdown rendering for the chat surfaces (headings, tables,
  # fenced code, lists, task lists, blockquotes, …). Both app targets compile
  # the chat tree, so it's added to Talaria and TalariaIOS (not HermesKit,
  # which stays UI-free). Repo is `swift-markdown-ui`; product is `MarkdownUI`.
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.1"
  # highlight.js (via JavaScriptCore) for multi-language code-block syntax
  # highlighting behind MarkdownUI's synchronous CodeSyntaxHighlighter.
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.0"
targets:
  Talaria:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Talaria
        excludes:
          - "Info-iOS.plist"
          # Convention: any `iOS/` folder under Talaria/ is iOS-target-only.
          # Lets seam files define the same symbol in macOS/ and iOS/ folders
          # without a collision (only one compiles per target) — no `#if`.
          - "**/iOS/**"
    dependencies:
      - package: HermesKit
      - package: Sparkle
      - package: SwiftTerm
      - package: MarkdownUI
      - package: Highlightr
    scheme:
      testTargets:
        - TalariaTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talaria.Talaria
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Talaria/Info.plist
        MARKETING_VERSION: 1.2
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: 6.0
        CODE_SIGN_ENTITLEMENTS: Talaria/Talaria.entitlements
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: "9URLHJ84PY"
          OTHER_CODE_SIGN_FLAGS: "--timestamp --options=runtime"

  TalariaIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Talaria
        excludes:
          - "Info.plist"
          - "Talaria.entitlements"
          # Convention: any `macOS/` folder under Talaria/ is macOS-target-only.
          # Mirror of the macOS target's `**/iOS/**` exclude — see that note.
          - "**/macOS/**"
    dependencies:
      - package: HermesKit
      - package: MarkdownUI
      - package: Highlightr
    scheme:
      testTargets:
        - TalariaIOSUITests
    settings:
      base:
        # iOS uses a distinct, owned reverse-domain id (lyx.io) for its App
        # Store record. The macOS target deliberately stays com.talaria.Talaria:
        # it ships via GitHub + Sparkle, and Sparkle refuses updates whose
        # CFBundleIdentifier differs from the installed host, so renaming it
        # would strand every existing v1.0 user. See RELEASE_SETUP.md §9b.
        PRODUCT_BUNDLE_IDENTIFIER: io.lyx.Talaria
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Talaria/Info-iOS.plist
        MARKETING_VERSION: 1.2
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 6.0
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        # Automatic signing for both Debug and Release. The team is set in
        # base (not per-config) so on-device Debug builds provision too —
        # simulator ignores signing, but a real iPhone/iPad needs the team.
        # Both the Apple Development and Developer ID certs on file resolve
        # to team 9URLHJ84PY (the cert OU), so iOS dev signing uses the
        # Apple Development cert automatically.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "9URLHJ84PY"

  TalariaTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: TalariaTests
    dependencies:
      - target: Talaria
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talaria.Talaria.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0

  TalariaIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TalariaUITests
    dependencies:
      - target: TalariaIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talaria.Talaria.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "9URLHJ84PY"
        TEST_TARGET_NAME: TalariaIOS
